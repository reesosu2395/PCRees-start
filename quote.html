<div class="form-container">
    <form onsubmit="event.preventDefault(); alert('Quote request sent! Returning to home.'); window.location.href='index.html';">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="device">Device Type</label>
            <select id="device" class="form-control" required>
                <option value="" disabled selected>Select your device...</option>
                <option value="desktop">Windows Desktop PC</option>
                <option value="laptop">Windows Laptop</option>
                <option value="mac">MacBook / iMac</option>
                <option value="other">Other / Not Sure</option>
            </select>
        </div>

        <div class="form-group">
            <label for="issue">Describe the Issue</label>
            <textarea id="issue" class="form-control" required placeholder="e.g., My computer is running very slow..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Quote Request</button>
    </form>
</div>
