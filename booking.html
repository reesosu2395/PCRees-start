<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Repair | PC Rees-Start</title>
    <style>
        :root {
            --primary-blue: #1A365D;
            --accent-green: #38A169;
            --light-bg: #F7FAFC;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER STYLING - ONLY ONE BLOCK */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-logo {
            height: 50px;
            width: auto;
        }

        nav a { 
            color: white; 
            text-decoration: none; 
            margin-left: 20px; 
            font-weight: 500; 
        }

        .nav-btn {
            background-color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 5px;
            color: white !important;
        }

        .booking-container {
            flex: 1;
            padding: 2rem 5%;
            text-align: center;
        }

        footer {
            background-color: #2D3748;
            color: white;
            text-align: center;
            padding: 2rem;
        }

</head>
<body>

    <header>
        <a href="index.html">
            <img src="logo.png" alt="PC Rees-Start Logo" class="header-logo">
        </a>
        <nav>
            <a href="index.html#services">Services</a>
            <a href="quote.html">Get Quote</a>
            <a href="booking.html" class="nav-btn">Book Now</a>
        </nav>

    <div class="booking-container">
        <h1 style="color: var(--primary-blue);">Schedule Your Repair</h1>

        <div class="calendly-inline-widget" data-url="https://calendly.com/reesosu?hide_landing_page_details=1&hide_gdpr_banner=1" style="min-width:320px;height:700px;"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    </div>

    <footer>

    </footer>
