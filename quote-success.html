<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Requested | PC Rees-Start</title>
    <style>
        :root {
            --primary-black: #111111;
            --accent-orange: #FF6B00;
            --light-bg: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--light-bg);
            text-align: center;
        }
        .container {
            padding: 40px;
            max-width: 500px;
        }
        .icon {
            font-size: 80px;
            color: var(--accent-orange);
            margin-bottom: 20px;
        }
        h1 { color: var(--primary-black); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #4A5568; font-size: 1.1rem; margin-bottom: 30px; }
        .btn {
            background-color: var(--primary-black);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: var(--accent-orange); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✉️</div>
        <h1>Quote Request Sent!</h1>
        <p>Thanks for reaching out. I’ll review your details and get back to you with an estimate within 24 hours.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
