<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Repair | PC Rees-Start</title>
    <style>
        :root {
            --primary-blue: #1A365D;
            --accent-green: #38A169;
            --light-bg: #F7FAFC;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.8rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--accent-green); }

        nav a { 
            color: white; 
            text-decoration: none; 
            margin-left: 20px; 
            font-weight: 500; 
        }

        .nav-btn {
            background-color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 5px;
            transition: opacity 0.3s;
        }

        .nav-btn:hover { opacity: 0.9; color: white; }

        .booking-container {
            flex: 1;
            padding: 2rem 5%;
            text-align: center;
        }

        h1 { color: var(--primary-blue); margin-bottom: 0.5rem; }
        .subtitle { color: #4A5568; margin-bottom: 2rem; }

        /* The Calendly Wrapper */
        .calendly-inline-widget {
            min-width: 320px;
            height: 700px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        footer {
            background-color: #2D3748;
            color: white;
            text-align: center;
            padding: 2rem 5%;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; }
            nav { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PC <span>Rees-Start</span></a>
      <header>
    <div class="logo">PC <span>Rees-Start</span></div>
    <nav>
        <a href="#services">Services</a>
        <a href="quote.html">Get Quote</a>
        <a href="booking.html" style="background: var(--accent-green); padding: 8px 16px; border-radius: 5px;">Book Now</a>
    </nav>
</header>
    </header>

    <div class="booking-container">
        <h1>Schedule Your Repair</h1>
        <p class="subtitle">Pick a time that works for you and I'll see you then!</p>
        
        <div class="calendly-inline-widget" data-url="https://calendly.com/reesosu?hide_landing_page_details=1&hide_gdpr_banner=1"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        </div>

    <footer>
        <p>&copy; 2026 PC Rees-Start. All rights reserved.</p>
    </footer>

</body>
</html>
